# esphome run led7219-and-nfc.yaml
# fonctionne correctement
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600  # Exécuté très tôt dans le processus de boot
    then:
      - light.turn_off: status_led

substitutions:
  name: tagreader
  friendly_name: TagReader

esp32:
  board: esp32-c5-devkitc-1
  framework:
    type: esp-idf

# Active le log pour debug
logger:
  baud_rate: 115200
  hardware_uart: UART0

# Home Assistant API
api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid24
  password: !secret wifi_password24
  #power_save_mode: none  # désactive l'économie d'énergie wifi (source fréquente de déco)
  ap:
    ssid: ${name} AP
    password: !secret wifi_password24

captive_portal:                                

spi:
  clk_pin: GPIO28
  mosi_pin: GPIO23

time:
  - platform: homeassistant
    id: ha_time

# Définition de la LED RVB (GPIO 27)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "LED Statut"
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# Variables pour texte
text:
  - platform: template
    name: "Texte affiché"
    id: display_text
    mode: text
    optimistic: true
    initial_value: "Hello"

# Display MAX7219
display:
  - platform: max7219digit
    id: led_matrix_display
    cs_pin: GPIO5
    num_chips: 4
    intensity: 0
    rotate_chip: 0
    scroll_enable: true
    scroll_speed: 80ms
    scroll_delay: 1s
    scroll_dwell: 1s
    lambda: |-
      auto my_text = id(display_text).state;
      // Ajustez le chiffre '5' selon le nombre de caractères qui tiennent sur vos 4 modules
      // -2 = décalage de 2 pixels vers le haut pour font Minecraftia-Regular.ttf
      if (my_text.length() > 5) {
        it.printf(0, -2, id(font1), "%s...", my_text.c_str());
      } else {
        it.print(0, -2, id(font1), my_text.c_str());
      }

font:
  - file: "fonts/Minecraftia-Regular.ttf"
    id: font1
    size: 8
    glyphs: 
      - " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"
      - "éàèêëîïôûùçÀÉÈÂÊËÎÏÔÛÙÇäöüÄÖÜ"

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: False
  frequency: 400kHz

globals:
  - id: source
    type: std::string
  - id: url
    type: std::string
  - id: info
    type: std::string

pn532_i2c:
  id: pn532_board
  on_tag:
    then:
    - light.turn_on:
        id: status_led
        brightness: 100%
        red: 0%
        green: 100%
        blue: 0%
        #flash_length: 500ms

    - delay: 0.15s #to fix slow component

    - lambda: |-
        id(source)="";
        id(url)="";
        id(info)="";
        if (tag.has_ndef_message()) {
          auto message = tag.get_ndef_message();
          auto records = message->get_records();
          for (auto &record : records) {
            std::string payload = record->get_payload();
            std::string type = record->get_type();
            size_t hass = payload.find("https://www.home-assistant.io/tag/");
            size_t applemusic = payload.find("https://music.apple.com");
            size_t spotify = payload.find("https://open.spotify.com");
            size_t sonos = payload.find("sonos-2://");

            size_t mass_deezer = payload.find("deezer://");
            size_t mass_filesystem_local = payload.find("filesystem_local://");
            size_t mass_filesystem_smb = payload.find("filesystem_smb://");
            size_t mass_plex = payload.find("plex://");
            size_t mass_qobuz = payload.find("qobuz://");
            size_t mass_radiobrowser = payload.find("radiobrowser://");
            size_t mass_soundcloud = payload.find("soundcloud://");
            size_t mass_spotify = payload.find("spotify://");
            size_t mass_tidal = payload.find("tidal://");
            size_t mass_tunein = payload.find("tunein://");
            size_t mass_ytmusic = payload.find("ytmusic://");

            if (type == "U" and hass != std::string::npos ) {
              ESP_LOGD("tagreader", "Found Home Assistant tag NDEF");
              id(source)="hass";
              id(url)=payload;
              id(info)=payload.substr(hass + 34);
            }
            else if (type == "U" and applemusic != std::string::npos ) {
              ESP_LOGD("tagreader", "Found Apple Music tag NDEF");
              id(source)="amusic";
              id(url)=payload;
            }
            else if (type == "U" and spotify != std::string::npos ) {
              ESP_LOGD("tagreader", "Found Spotify tag NDEF");
              id(source)="spotify";
              id(url)=payload;
            }
            else if (type == "U" and sonos != std::string::npos ) {
              ESP_LOGD("tagreader", "Found Sonos app tag NDEF");
              id(source)="sonos";
              id(url)=payload;
            }
            else if (type == "U" && (mass_deezer != std::string::npos ||
                    mass_filesystem_local != std::string::npos ||
                    mass_filesystem_smb != std::string::npos ||
                    mass_plex != std::string::npos ||
                    mass_qobuz != std::string::npos ||
                    mass_radiobrowser != std::string::npos ||
                    mass_soundcloud != std::string::npos ||
                    mass_spotify != std::string::npos ||
                    mass_tidal != std::string::npos ||
                    mass_tunein != std::string::npos ||
                    mass_ytmusic != std::string::npos)) {
              ESP_LOGD("tagreader", "Found Music Assistant tag NDEF");
              id(source) = "mass";
              id(url) = payload;
            }
            else if (type == "T" ) {
              ESP_LOGD("tagreader", "Found music info tag NDEF");
              id(info)=payload;
            }
            else if ( id(source)=="" ) {
              id(source)="uid";
            }
          }
        }
        else {
          id(source)="uid";
        }

    - if:
        condition:
          lambda: 'return ( id(source)=="uid" );'
        then:
          - homeassistant.tag_scanned: !lambda |-
              ESP_LOGD("tagreader", "No HA NDEF, using UID");
              return x;
        else:
        - if:
            condition:
              lambda: 'return ( id(source)=="hass" );'
            then:
            - homeassistant.tag_scanned: !lambda 'return id(info);'
            else:
            - homeassistant.event:
                event: esphome.music_tag
                data:
                  reader: !lambda |-
                    return App.get_name().c_str();
                  source: !lambda |-
                    return id(source);
                  url: !lambda |-
                    return id(url);
                  info: !lambda |-
                    return id(info);

  on_tag_removed:
    then:
    - light.turn_off:
        id: status_led
    - homeassistant.event:
        event: esphome.tag_removed