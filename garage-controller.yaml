# esphome run garage-controller.yaml
# fonctionne correctement
# Version 2026-05-16
# update esphome en cli local: pip install -U esphome
# NE PAS UTILISER GPIO5 -> utilisé au boot
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600  # Exécuté très tôt dans le processus de boot
    then:
      - light.turn_off: status_led

substitutions:
  name: garage-controller
  friendly_name: Garage controller
  
esp32:
  board: esp32-c5-devkitc-1
  framework:
    type: esp-idf

# Active le log pour debug
logger:
  baud_rate: 115200
  hardware_uart: UART0

# Home Assistant API
api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid24
  password: !secret wifi_password24
  #power_save_mode: none  # désactive l'économie d'énergie wifi (source fréquente de déco)
  ap:
    ssid: ${name} AP
    password: !secret wifi_password24
    
# Webserver
web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

captive_portal:

# composant externe pour télémètre laser
external_components:
  - source: github://soldierkam/vl53l1x_sensor # https://github.com/m5k10/vl53l1x_sensor
    refresh: 1s

globals:
  - id: temp_prev
    type: float
    initial_value: "0.0"

# Définition de la LED RVB (GPIO 27)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "LED Statut"
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# I2C pour BME680 + TOF400c
i2c:
  - id: bus_i2c
    sda: GPIO6
    scl: GPIO7
    scan: true  # affiche les adresses I2C détectées dans les logs au boot
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 100kHz


bme68x_bsec2_i2c:
    i2c_id: bus_i2c
    address: 0x77  # 0x76 par défaut, ou 0x77 si la broche SDO est reliée à VCC
    model: bme680
    operating_age: 28d
    sample_rate: LP
    supply_voltage: 3.3V
    id: bme680_garage
    temperature_offset: 0


binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    entity_category: diagnostic
    
  - platform: gpio # Capteur ouvert/fermé
    pin:
      number: GPIO24
      mode:
        input: true
        pullup: true  # résistance pull-up interne activée
      inverted: false  # fermé = contact fermé
    name: "Porte de garage"
    device_class: garage_door
    icon: "mdi:garage-open-variant"
    filters:
      - delayed_on: 50ms   # anti-rebond
      - delayed_off: 50ms
      
  - platform: template
    id: car_present
    name: "Voiture"
    device_class: presence
    
  - platform: template
    id: temp_rising
    name: "Température en hausse rapide"

  - platform: template
    id: fire_warning
    name: "Alerte fumée-feu"
    device_class: smoke
    lambda: |-
      return (id(iaq).state > 500) &&
             (id(temp_rising).state || id(co2_eq).state > 5000);
    filters:
      - delayed_on: 30s
      

sensor:
  - platform: vl53l1x_sensor # Capteur TOF400c
    id: distance_sensor
    name: "Distance"
    update_interval: 1s
    unit_of_measurement: "m"
    accuracy_decimals: 2
    address: 0x29
    enable_pin: GPIO8 # connected to XSHUT
    distance_mode: MEDIUM
    timing_budget: 200ms
    signal_threshold: 512
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x < 2.0;'
            then:
              - if:
                  condition:
                    binary_sensor.is_off: car_present
                  then:
                    - light.turn_on:
                        id: status_led
                        red: 100%
                        green: 0%
                        blue: 0%
                    - script.execute: led_off_timer
              - binary_sensor.template.publish:
                  id: car_present
                  state: true
            else:
              - if:
                  condition:
                    binary_sensor.is_on: car_present
                  then:
                    - script.stop: led_off_timer
                    - light.turn_on:
                        id: status_led
                        red: 0%
                        green: 100%
                        blue: 0%
                    - script.execute: led_off_timer
              - binary_sensor.template.publish:
                  id: car_present
                  state: false
    
  - platform: bme68x_bsec2 # Capteur BME680
    bme68x_bsec2_id: bme680_garage
    temperature:
      name: "Température"
      unit_of_measurement: "°C"
      id: temp_garage
      on_value:
        then:
          - lambda: |-
              float delta = x - id(temp_prev);
              id(temp_prev) = x;
              // delta > 0.08°C/s ≈ 5°C/min
              if (delta > 0.08) id(temp_rising).publish_state(true);
              else id(temp_rising).publish_state(false);
    pressure:
      name: "Pression"
      unit_of_measurement: "hPa"
    humidity:
      id: "humidity"
      name: "Humidité"
      unit_of_measurement: "%"
 
    iaq_static:
      name: "IAQ"
      id: iaq
      unit_of_measurement: ""
      icon: "mdi:gauge"
      state_class: measurement
      # Échelle Bosch : 0-50 excellent, 51-100 bon, 101-150 légèrement pollué,
      # 151-200 modérément, 201-250 fortement, 251-350 sévèrement, >351 extrême
 
    #iaq_accuracy:
    #  name: "IAQ précision (numérique)"
      # 0 = Stabilizing, 1 = Uncertain, 2 = Calibrating, 3 = Calibrated
 
    co2_equivalent:
      name: "CO₂ équivalent"
      unit_of_measurement: "ppm"
      id: co2_eq
      icon: "mdi:molecule-co2"
      device_class: carbon_dioxide
      state_class: measurement
      accuracy_decimals: 0
      # Estimé par corrélation VOC↔CO₂ (pas un vrai capteur CO₂ NDIR)
 
    breath_voc_equivalent:
      name: "COV équivalent"
      unit_of_measurement: "ppm"
      icon: "mdi:air-filter"
      state_class: measurement
      accuracy_decimals: 2
      # Composés organiques volatils : éthanol, acétone, isoprène, CO...
      
      



script:
  - id: led_off_timer # Eteindre la LED après 5 minutes
    mode: restart # Repart à zéro si la voiture est re-détectée avant 5 min
    then:
      - delay: 5min
      - light.turn_off:
          id: status_led
  - id: led_blink # Faire clignoter la LED durant 20 secondes
    then:
      - repeat:
          count: 10
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
            - delay: 1000ms
            - light.turn_off:
                id: status_led
            - delay: 1000ms
    
switch:
  - platform: gpio
    pin: GPIO26
    id: garage_relay
    inverted: true
    restore_mode: ALWAYS_OFF
    internal: true
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: garage_relay

    
text_sensor:
  - platform: version
    hide_timestamp: true
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:wifi
      entity_category: diagnostic
    ssid:
      name: "${friendly_name} Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic

  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "Etat IAQ"
      # Valeurs : Stabilizing → Uncertain → Calibrating → Calibrated
      # Attendre "Calibrated" avant de faire confiance aux valeurs IAQ
 
  # Traduction de l'indice IAQ en niveau lisible
  - platform: template
    name: "Qualité de l'air"
    icon: "mdi:leaf"
    lambda: |-
      int i = int(id(iaq).state);
      if (i <= 50)        return {"Excellent"};
      else if (i <= 100)  return {"Bon"};
      else if (i <= 150)  return {"Légèrement pollué"};
      else if (i <= 200)  return {"Modérément pollué"};
      else if (i <= 250)  return {"Fortement pollué"};
      else if (i <= 350)  return {"Sévèrement pollué"};
      else if (i <= 500)  return {"Extrêmement pollué"};
      else                return {"Inconnu"};
    update_interval: 10s


# Define buttons for HA
button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config
  - platform: template
    name: "Ouvrir-fermer garage"
    icon: "mdi:garage-open-variant"
    id: open_close_garage
    on_press:
      - switch.turn_on: garage_relay


