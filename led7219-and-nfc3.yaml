# esphome run led7219-and-nfc.yaml
# fonctionne correctement
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 600
      then:
        - light.turn_off: status_led

    - priority: -10
      then:
        - wait_until:
            api.connected:
        - logger.log: "API is connected!"
        - rtttl.play: "success:d=24,o=5,b=100:c,g,b"
        - light.turn_on:
            id: status_led
            brightness: 100%
            red: 0%
            green: 0%
            blue: 100%
            flash_length: 500ms
        - switch.turn_on: buzzer_enabled
        - switch.turn_on: led_enabled

substitutions:
  name: tagreader
  friendly_name: TagReader

esp32:
  board: esp32-c5-devkitc-1
  framework:
    type: esp-idf

# Active le log pour debug
logger:
  baud_rate: 115200
  hardware_uart: UART0

# Home Assistant API
# Enable Home Assistant API
api:
  encryption:
    key: !secret ha_api_key

  services:
  - service: display_text
    variables:
      text_to_display: string
    then:
      - text.set:
          id: display_text
          value: !lambda 'return text_to_display;'

  - service: write_tag
    variables:
      url: string
      info: string
    then:
    - light.turn_on:
        id: status_led
        brightness: 100%
        red: 100%
        green: 0%
        blue: 0%
    - lambda: |-
        auto message = new nfc::NdefMessage();
        std::string uri = "";
        std::string text = "";
        uri += url;
        text += info;
        if ( url != "" ) {
          message->add_uri_record(uri);
        }
        if ( info != "" ) {
          message->add_text_record(text);
        }
        id(pn532_board).write_mode(message);
    - rtttl.play: "write:d=24,o=5,b=100:b"
    - wait_until:
        not:
          pn532.is_writing:
    - light.turn_off:
        id: status_led
    - rtttl.play: "write:d=24,o=5,b=100:b,b"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid24
  password: !secret wifi_password24
  #power_save_mode: none  # désactive l'économie d'énergie wifi (source fréquente de déco)
  ap:
    ssid: ${name} AP
    password: !secret wifi_password24

captive_portal:                                

spi:
  clk_pin: GPIO28
  mosi_pin: GPIO23

time:
  - platform: homeassistant
    id: ha_time

globals:
  - id: source
    type: std::string
  - id: url
    type: std::string
  - id: info
    type: std::string

# Définition de la LED RVB (GPIO 27)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "LED Statut"
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# Variables pour texte
text:
  - platform: template
    name: "Texte affiché"
    id: display_text
    mode: text
    optimistic: true
    initial_value: "Hello"

# Define switches to control LED and buzzer from HA
switch:
- platform: template
  name: "${friendly_name} Buzzer Enabled"
  id: buzzer_enabled
  icon: mdi:volume-high
  optimistic: true
  restore_mode: RESTORE_DEFAULT_ON
  entity_category: config
- platform: template
  name: "${friendly_name} LED enabled"
  id: led_enabled
  icon: mdi:alarm-light-outline
  optimistic: true
  restore_mode: RESTORE_DEFAULT_ON
  entity_category: config

# Define buttons for writing tags via HA
button:
  - platform: template
    name: Write Tag Random
    id: write_tag_random
    # Optional variables:
    icon: "mdi:pencil-box"
    on_press:
      then:
      - light.turn_on:
          id: status_led
          brightness: 100%
          red: 100%
          green: 0%
          blue: 100%
      - lambda: |-
          static const char alphanum[] = "0123456789abcdef";
          std::string uri = "https://www.home-assistant.io/tag/";
          for (int i = 0; i < 8; i++)
            uri += alphanum[random_uint32() % (sizeof(alphanum) - 1)];
          uri += "-";
          for (int j = 0; j < 3; j++) {
            for (int i = 0; i < 4; i++)
              uri += alphanum[random_uint32() % (sizeof(alphanum) - 1)];
            uri += "-";
          }
          for (int i = 0; i < 12; i++)
            uri += alphanum[random_uint32() % (sizeof(alphanum) - 1)];
          auto message = new nfc::NdefMessage();
          message->add_uri_record(uri);
          ESP_LOGD("tagreader", "Writing payload: %s", uri.c_str());
          id(pn532_board).write_mode(message);
      - rtttl.play: "write:d=24,o=5,b=100:b"
      - wait_until:
          not:
            pn532.is_writing:
      - light.turn_off:
          id: status_led
      - rtttl.play: "write:d=24,o=5,b=100:b,b"
  - platform: template
    name: Clean Tag
    id: clean_tag
    icon: "mdi:nfc-variant-off"
    on_press:
      then:
      - light.turn_on:
          id: status_led
          brightness: 100%
          red: 100%
          green: 64.7%
          blue: 0%
      - lambda: 'id(pn532_board).clean_mode();'
      - rtttl.play: "write:d=24,o=5,b=100:b"
      - wait_until:
          not:
            pn532.is_writing:
      - light.turn_off:
          id: status_led
      - rtttl.play: "write:d=24,o=5,b=100:b,b"
  - platform: template
    name: Cancel writing
    id: cancel_writing
    icon: "mdi:pencil-off"
    on_press:
      then:
      - lambda: 'id(pn532_board).read_mode();'
      - light.turn_off:
          id: status_led
      - rtttl.play: "write:d=24,o=5,b=100:b,b"

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

# Display MAX7219
display:
  - platform: max7219digit
    id: led_matrix_display
    cs_pin: GPIO5
    num_chips: 4
    intensity: 0
    rotate_chip: 0
    scroll_enable: true
    scroll_speed: 80ms
    scroll_delay: 1s
    scroll_dwell: 1s
    lambda: |-
      auto my_text = id(display_text).state;
      // Ajustez le chiffre '5' selon le nombre de caractères qui tiennent sur vos 4 modules
      // -2 = décalage de 2 pixels vers le haut pour font Minecraftia-Regular.ttf
      if (my_text.length() > 5) {
        it.printf(0, -2, id(font1), "%s...", my_text.c_str());
      } else {
        it.print(0, -2, id(font1), my_text.c_str());
      }

font:
  - file: "fonts/Minecraftia-Regular.ttf"
    id: font1
    size: 8
    glyphs: 
      - " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~"
      - "éàèêëîïôûùçÀÉÈÂÊËÎÏÔÛÙÇäöüÄÖÜ"

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: False
  frequency: 400kHz

pn532_i2c:
  id: pn532_board
  on_tag:
    then:
    - if:
        condition:
          switch.is_on: led_enabled
        then:
        - light.turn_on:
            id: status_led
            brightness: 100%
            red: 0%
            green: 100%
            blue: 0%
            flash_length: 500ms

    - delay: 0.15s #to fix slow component

    - homeassistant.tag_scanned: !lambda 'return x;'

    - if:
        condition:
          switch.is_on: buzzer_enabled
        then:
        - rtttl.play: "success:d=24,o=5,b=100:c,g,b"
  on_tag_removed:
    then:
    - homeassistant.event:
        event: esphome.tag_removed

# Define the buzzer output
output:
- platform: ledc
  pin: GPIO7
  id: buzzer
  
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    entity_category: diagnostic
    
text_sensor:
  - platform: version
    hide_timestamp: true
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:wifi
      entity_category: diagnostic
    ssid:
      name: "${friendly_name} Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic

# Define buzzer as output for RTTTL
rtttl:
  output: buzzer