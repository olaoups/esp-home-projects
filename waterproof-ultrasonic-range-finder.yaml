# esphome run waterproof-ultrasonic-range-finder.yaml
# fonctionne correctement
# Version 2026-05-04
# update esphome en cli local: pip install -U esphome
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600  # Exécuté très tôt dans le processus de boot
    then:
      - light.turn_off: status_led

substitutions:
  name: ultrasonic-meter
  friendly_name: Ultrasonic Meter
  
esp32:
  board: esp32-c5-devkitc-1
  framework:
    type: esp-idf

# Active le log pour debug
logger:
  baud_rate: 115200
  hardware_uart: UART0

# Home Assistant API
api:
  #encryption:
  #  key: !secret ha_api_key

ota:
  - platform: esphome

wifi:
  #ssid: !secret wifi_ssid24
  #password: !secret wifi_password24
  #power_save_mode: none  # désactive l'économie d'énergie wifi (source fréquente de déco)
  ap:
    ssid: ${name}-ap
    password: "12345678"
    
# Webserver
web_server:
  port: 80
  version: 3
  #auth:
  #  username: !secret web_server_username
  #  password: !secret web_server_password

captive_portal:


# ─────────────────────────────────────────────
# Paliers persistants (stockés en NVS flash)
# Logique : vert  si d ≤ seuil_vert
#            bleu  si seuil_vert < d ≤ seuil_bleu
#            rouge si seuil_bleu < d ≤ seuil_rouge
#            LED éteinte au-delà de seuil_rouge
# ─────────────────────────────────────────────
globals:
  - id: seuil_vert
    type: float
    restore_value: true
    initial_value: "50.0"
  - id: seuil_bleu
    type: float
    restore_value: true
    initial_value: "100.0"
  - id: seuil_rouge
    type: float
    restore_value: true
    initial_value: "150.0"

# ─────────────────────────────────────────────
# Curseurs Home Assistant / Web server pour modifier les seuils
# ─────────────────────────────────────────────
number:
  - platform: template
    name: "1. Vert dès (cm)"
    id: seuil_vert_input
    icon: mdi:circle
    entity_category: config
    min_value: 1
    max_value: 300
    step: 1
    unit_of_measurement: "cm"
    lambda: "return id(seuil_vert);"
    set_action:
      - globals.set:
          id: seuil_vert
          value: !lambda "return x;"

  - platform: template
    name: "2. Bleu dès (cm)"
    id: seuil_bleu_input
    icon: mdi:circle
    entity_category: config
    min_value: 1
    max_value: 300
    step: 1
    unit_of_measurement: "cm"
    lambda: "return id(seuil_bleu);"
    set_action:
      - globals.set:
          id: seuil_bleu
          value: !lambda "return x;"

  - platform: template
    name: "3. Rouge dès (cm)"
    id: seuil_rouge_input
    icon: mdi:circle
    entity_category: config
    min_value: 1
    max_value: 300
    step: 1
    unit_of_measurement: "cm"
    lambda: "return id(seuil_rouge);"
    set_action:
      - globals.set:
          id: seuil_rouge
          value: !lambda "return x;"

# Définition de la LED RVB (GPIO 27)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "LED Statut"
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF


binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    entity_category: diagnostic
      
text_sensor:
  - platform: version
    hide_timestamp: true
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      icon: mdi:wifi
      entity_category: diagnostic
    ssid:
      name: "${friendly_name} Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic

# Define buttons for HA
button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config


sensor:
  - platform: ultrasonic
    trigger_pin: GPIO25 #RX
    echo_pin: GPIO26 #TX
    name: "Distance"
    id: distance_sensor
 
    # Fréquence de mise à jour (adapter selon le besoin)
    update_interval: 500ms
 
    # Timeout : JSN-SR04T porte max ~3m, ajuster si modèle longue portée (6m)
    timeout: 3m
 
    # Filtre médian sur 5 mesures pour éliminer les faux positifs
    filters:
      - median:
          window_size: 5
          send_every: 5
          send_first_at: 1
      - lambda: |-
          // Conversion mètres → centimètres + rejet hors plage
          if (x < 0.02f || x > 3.0f) return {};
          return x * 100.0f;
      # Arrondi à 1 décimale (suffisant en cm)
      - round: 1
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    icon: "mdi:ruler"

    on_value:
      then:
        - lambda: |-
            if (!id(status_led).current_values.is_on()) return;
            float d = x;
            auto call = id(status_led).turn_on();
            call.set_brightness(0.6f);
            if (d <= id(seuil_vert)) {
              call.set_rgb(0.0f, 1.0f, 0.0f);  // Vert
            } else if (d <= id(seuil_bleu)) {
              call.set_rgb(0.0f, 0.0f, 1.0f);  // Bleu
            } else if (d <= id(seuil_rouge)) {
              call.set_rgb(1.0f, 0.0f, 0.0f);  // Rouge
            } else {
              id(status_led).turn_off().perform();
              return;
            }
            call.perform();


